services:
  ollama:
    image: ollama/ollama:latest
    container_name: datagovin-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      # Pin loaded models in RAM forever. The app overrides per-call via the
      # active profile's keep_alive, but this is a safety floor for the
      # daemon itself.
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build: .
    container_name: datagovin-chatbot
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_DB_PATH=/app/chroma_db
      - PDF_FOLDER=/app/pdfs
      # Force a specific hardware tier; leave unset for auto-detection.
      # Set this when running in a container that has cgroup limits the
      # auto-detector can't see (e.g. on a 128 GB host running an 8 GB
      # container -> set PROFILE_OVERRIDE=large).
      - PROFILE_OVERRIDE=${PROFILE_OVERRIDE:-}
    volumes:
      - ./pdfs:/app/pdfs
      - ./chroma_db:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_models:
  hf_cache:
